services:
  - type: web
    name: mazha-tap-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PORT
        value: 8000
    plan: free

  - type: web
    name: mazha-pocketbase
    runtime: docker
    rootDir: pocketbase
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    plan: free
